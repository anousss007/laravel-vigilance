name: Bug report
description: Report a problem with Vigilance.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report. Please fill out the sections below.
  - type: input
    id: vigilance-version
    attributes:
      label: Vigilance version
      placeholder: e.g. v1.0.0
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: e.g. 12.x
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3
    validations:
      required: true
  - type: input
    id: queue-driver
    attributes:
      label: Queue driver
      placeholder: e.g. database, redis, sqs, beanstalkd, sync
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A clear, minimal set of steps (or a repository) that reproduces the issue.
    validations:
      required: true

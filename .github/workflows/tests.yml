name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['12.*', '13.*']
        livewire: ['3.*', '4.*']
        exclude:
          # Laravel 13 requires PHP >= 8.3.
          - php: '8.2'
            laravel: '13.*'
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · Livewire ${{ matrix.livewire }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          # Temporary: nesbot/carbon 3.12 changed the Carbon::plus()/minus()
          # signature; Laravel 13 matches it but Laravel 12 does not yet, so
          # Laravel 12 + Carbon 3.12 fatals on class load. Hold Carbon < 3.12 on
          # the Laravel 12 legs until a compatible Laravel 12 patch ships.
          if [ "${{ matrix.laravel }}" = "12.*" ]; then
            composer require "nesbot/carbon:<3.12" --no-update --no-interaction
          fi
          composer require "laravel/framework:${{ matrix.laravel }}" "livewire/livewire:${{ matrix.livewire }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  quality:
    runs-on: ubuntu-latest
    name: lint + static analysis
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['12.*', '13.*']
        livewire: ['3.*', '4.*']
        exclude:
          # Laravel 13 requires PHP >= 8.3.
          - php: '8.2'
            laravel: '13.*'
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · Livewire ${{ matrix.livewire }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          # Temporary: nesbot/carbon 3.12 changed the Carbon::plus()/minus()
          # signature; Laravel 13 matches it but Laravel 12 does not yet, so
          # Laravel 12 + Carbon 3.12 fatals on class load. Hold Carbon < 3.12 on
          # the Laravel 12 legs until a compatible Laravel 12 patch ships.
          if [ "${{ matrix.laravel }}" = "12.*" ]; then
            composer require "nesbot/carbon:<3.12" --no-update --no-interaction
          fi
          composer require "laravel/framework:${{ matrix.laravel }}" "livewire/livewire:${{ matrix.livewire }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  quality:
    runs-on: ubuntu-latest
    name: lint + static analysis
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress

  databases:
    runs-on: ubuntu-latest
    name: db compatibility (postgres + mysql)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vigilance_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: mariadb:11.4
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 1
          MARIADB_DATABASE: vigilance_test
        ports: ['3306:3306']
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized" --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, sqlite, pdo_sqlite, pdo_mysql, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Tests on PostgreSQL
        env:
          VIGILANCE_TEST_DB: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: vigilance_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: vendor/bin/pest

      - name: Tests on MySQL (MariaDB)
        env:
          VIGILANCE_TEST_DB: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: vigilance_test
          DB_USERNAME: root
          DB_PASSWORD: ''
        run: vendor/bin/pest
